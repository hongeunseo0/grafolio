<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>작품 업로드 인터페이스</title>
    <!-- Tailwind CSS CDN 로드 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap" rel="stylesheet">
    <style>
        /* 사용자 정의 색상 정의 */
        :root {
            --primary-color: #00b57f;
            --primary-bg: #e6fff4; /* Light background for the color */
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f7f7f7;
        }
        .main-container {
            height: 100vh;
            max-height: 100vh;
        }
        .primary-button {
            background-color: var(--primary-color);
            color: white;
            transition: background-color 0.2s;
        }
        .primary-button:hover {
            background-color: #009968;
        }
        .sidebar {
            width: 30%;
            min-width: 300px;
        }
        .main-content {
            width: 70%;
        }
        .content-block {
            min-height: 150px;
            padding: 1rem;
            margin-bottom: 1.5rem;
            border-radius: 0.5rem;
            box-shadow: 0 1px 3px 0 rgba(0, 0, 0, 0.1), 0 1px 2px 0 rgba(0, 0, 0, 0.06);
            background-color: white;
            border: 1px solid #e5e7eb;
        }
        .image-placeholder {
            min-height: 300px;
            background-color: #f3f4f6;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #6b7280;
            border: 2px dashed #d1d5db;
        }
        .drag-area {
            height: 400px; /* 초기 드래그 영역 크기 */
        }
    </style>
</head>
<body class="overflow-hidden">

    <div id="app" class="flex main-container">
        <!-- 메인 콘텐츠 영역 (2/3) -->
        <main class="main-content bg-white p-6 overflow-y-auto">
            <h1 class="text-3xl font-bold mb-6 text-gray-800">작품 업로드</h1>

            <!-- 1. 초기 드래그 앤 드롭 업로드 영역 -->
            <div id="initial-upload-area" 
                 class="drag-area border-2 border-dashed border-gray-300 rounded-xl p-12 mb-8 
                        flex flex-col items-center justify-center text-center cursor-pointer 
                        hover:border-green-500 hover:bg-green-50 transition duration-200"
                 onclick="document.getElementById('file-input-main').click()">
                <svg class="w-12 h-12 text-gray-400 mb-3" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.885-7.885 4 4 0 016.77-3.23L12 6l-1.077 1.077A4 4 0 0115 12h-2v4a2 2 0 01-4 0v-4z"></path></svg>
                <p class="text-xl font-semibold text-gray-600">
                    작품 파일을 여기에 끌어다 놓거나 클릭하여 업로드
                </p>
                <p class="text-sm text-gray-500 mt-1">이미지, 영상, PDF 등 (최대 50MB)</p>
            </div>
            
            <input type="file" id="file-input-main" accept="image/*,video/*" class="hidden" onchange="handleMainFileUpload(event)">

            <!-- 2. 동적 콘텐츠 블록 컨테이너 -->
            <div id="content-blocks-container">
                <!-- 콘텐츠 블록들이 여기에 추가됩니다 -->
            </div>

        </main>

        <!-- 사이드바 영역 -->
        <aside class="sidebar bg-gray-50 border-l border-gray-200 flex flex-col max-h-full">
            <div class="p-6 flex-grow overflow-y-auto">
                
                <!-- 1. 목업 AI 활용 박스 -->
                <div id="mockup-ai-box" class="w-full h-32 bg-gray-200 rounded-lg p-4 mb-6 border border-gray-300 flex items-center justify-center">
                    <p class="text-gray-500 text-center text-sm font-medium">
                        업로드 후 목업 화면 미리보기 (이미지 추가 시 자동 변환)
                    </p>
                </div>

                <!-- 2. 콘텐츠 추가 -->
                <h2 class="text-lg font-semibold mb-3 text-gray-700">콘텐츠 추가</h2>
                <div class="grid grid-cols-2 gap-3 mb-6">
                    <button class="text-center p-3 rounded-lg bg-white border border-gray-200 hover:bg-gray-100 transition duration-150 shadow-sm" onclick="addContentBlock('text')">
                        <span class="font-medium text-gray-800">텍스트</span>
                    </button>
                    <button class="text-center p-3 rounded-lg bg-white border border-gray-200 hover:bg-gray-100 transition duration-150 shadow-sm" onclick="triggerImageUpload('single')">
                        <span class="font-medium text-gray-800">이미지</span>
                    </button>
                    <button class="text-center p-3 rounded-lg bg-white border border-gray-200 hover:bg-gray-100 transition duration-150 shadow-sm" onclick="triggerImageUpload('multi')">
                        <span class="font-medium text-gray-800">멀티 이미지</span>
                    </button>
                    <button class="text-center p-3 rounded-lg bg-white border border-gray-200 hover:bg-gray-100 transition duration-150 shadow-sm" onclick="openModal('embed')">
                        <span class="font-medium text-gray-800">임베드</span>
                    </button>
                </div>
                
                <input type="file" id="file-input-content" accept="image/*" class="hidden" onchange="handleContentImageUpload(event)">
                <input type="file" id="file-input-multi-content" accept="image/*" multiple class="hidden" onchange="handleMultiImageUpload(event)">


                <!-- 3. 편집 및 관리 -->
                <div class="space-y-4 pt-4 border-t border-gray-200">
                    <div class="flex items-center justify-between">
                        <span class="font-medium text-gray-700">편집</span>
                        <button class="text-sm text-gray-600 hover:text-gray-900 px-3 py-1 rounded-md bg-white border border-gray-200 shadow-sm" onclick="openModal('order')">
                            콘텐츠 순서 변경
                        </button>
                    </div>

                    <div class="flex items-center justify-between">
                        <span class="font-medium text-gray-700">첨부파일 업로드</span>
                        <button class="text-sm text-gray-600 hover:text-gray-900 px-3 py-1 rounded-md bg-white border border-gray-200 shadow-sm" onclick="alert('첨부파일 관리 기능')">
                            첨부파일 관리
                        </button>
                    </div>
                    
                    <div class="flex items-center justify-between">
                        <span class="font-medium text-gray-700">배경화면으로 제공</span>
                        <button class="text-sm text-gray-600 hover:text-gray-900 px-3 py-1 rounded-md bg-white border border-gray-200 shadow-sm" onclick="alert('이미지 선택 기능')">
                            이미지 선택
                        </button>
                    </div>
                </div>

            </div>

            <!-- 하단 고정 버튼 영역 -->
            <div class="p-4 border-t border-gray-200 flex justify-between items-center bg-white shadow-lg">
                <button class="bg-gray-100 text-gray-700 px-4 py-3 rounded-lg font-semibold hover:bg-gray-200 transition duration-150">
                    임시 저장
                </button>
                <button class="primary-button px-6 py-3 rounded-lg font-bold" style="--primary-color: #00b57f;">
                    다음
                </button>
            </div>
        </aside>
    </div>

    <!-- 미디어 임베드 팝업 (Modal) -->
    <div id="embed-modal" class="hidden fixed inset-0 bg-black bg-opacity-50 z-50 flex items-center justify-center" onclick="closeModalOnOutsideClick(event, 'embed-modal')">
        <div class="bg-white rounded-xl shadow-2xl w-full max-w-lg p-6">
            <h3 class="text-2xl font-bold mb-4 text-gray-800">미디어 임베드</h3>
            <p class="text-sm text-gray-500 mb-4">Youtube, Soundcloud, Vimeo, Instagram, facebook 등 임베드 콘텐츠를 공유해 보세요.</p>
            
            <input type="text" id="embed-input" placeholder="임베드 코드 또는 URL 붙여넣기" 
                   class="w-full p-3 border border-gray-300 rounded-lg focus:border-green-500 focus:ring focus:ring-green-100 outline-none placeholder-gray-400">
            
            <div class="flex justify-end space-x-3 mt-6">
                <button class="bg-gray-100 text-gray-700 px-4 py-3 rounded-lg font-semibold hover:bg-gray-200 transition duration-150" onclick="closeModal('embed')">
                    취소
                </button>
                <button class="primary-button px-4 py-3 rounded-lg font-semibold" style="--primary-color: #00b57f;" onclick="addContentBlock('embed')">
                    추가
                </button>
            </div>
        </div>
    </div>

    <!-- 콘텐츠 순서 변경 팝업 (Modal) -->
    <div id="order-modal" class="hidden fixed inset-0 bg-black bg-opacity-50 z-50 flex items-center justify-center" onclick="closeModalOnOutsideClick(event, 'order-modal')">
        <div class="bg-white rounded-xl shadow-2xl w-full max-w-xl p-6">
            <h3 class="text-2xl font-bold mb-4 text-gray-800">콘텐츠 순서 변경</h3>
            <p class="text-sm text-gray-500 mb-4">블록을 드래그해서 콘텐츠 순서를 변경할 수 있습니다.</p>
            
            <!-- 드래그 가능한 목록 (예시) -->
            <div id="draggable-list" class="space-y-2 bg-gray-50 p-4 rounded-lg border border-gray-200">
                <div class="p-3 bg-white border border-gray-300 rounded-md cursor-grab flex justify-between items-center shadow-sm">
                    <span class="font-medium text-gray-700">
                        <svg class="w-5 h-5 inline mr-2 text-gray-500" fill="currentColor" viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg"><path d="M5 2a2 2 0 00-2 2v2a2 2 0 002 2h2a2 2 0 002-2V4a2 2 0 00-2-2H5zm3 10a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2zm-3 8a2 2 0 002-2v-2a2 2 0 00-2-2H5a2 2 0 00-2 2v2a2 2 0 002 2zm10-8a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2a2 2 0 012-2h2z"></path></svg>
                        텍스트 블록 1
                    </span>
                    <svg class="w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>
                </div>
                <!-- 실제 구현 시 JavaScript로 동적 콘텐츠 목록을 여기에 넣습니다. -->
            </div>

            <div class="flex justify-end space-x-3 mt-6">
                <button class="bg-gray-100 text-gray-700 px-4 py-3 rounded-lg font-semibold hover:bg-gray-200 transition duration-150" onclick="closeModal('order')">
                    취소
                </button>
                <button class="primary-button px-4 py-3 rounded-lg font-semibold" style="--primary-color: #00b57f;" onclick="alert('순서 저장됨')">
                    순서 저장
                </button>
            </div>
        </div>
    </div>

    <script>
        const contentContainer = document.getElementById('content-blocks-container');
        const initialUploadArea = document.getElementById('initial-upload-area');
        const mockupBox = document.getElementById('mockup-ai-box');

        // 메인 영역 파일 업로드 처리 (초기 업로드 칸)
        function handleMainFileUpload(event) {
            const files = event.target.files;
            if (files.length > 0) {
                const file = files[0];
                if (file.type.startsWith('image/')) {
                    const reader = new FileReader();
                    reader.onload = function(e) {
                        const imageUrl = e.target.result;
                        // 초기 업로드 칸을 이미지로 대체하고 목업 AI 박스 업데이트
                        displayUploadedImage(imageUrl, initialUploadArea, mockupBox);
                    };
                    reader.readAsDataURL(file);
                } else {
                    alert('현재는 이미지 파일만 지원합니다.');
                }
            }
        }

        // 콘텐츠 추가 버튼 클릭 시 이미지 업로드 트리거
        function triggerImageUpload(type) {
            if (type === 'multi') {
                document.getElementById('file-input-multi-content').click();
            } else {
                document.getElementById('file-input-content').click();
            }
        }

        // 사이드바 '이미지' 클릭 시 파일 업로드 처리 및 콘텐츠 블록 추가
        function handleContentImageUpload(event) {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const imageUrl = e.target.result;
                    addContentBlock('image', imageUrl);
                };
                reader.readAsDataURL(file);
            }
        }
        
        // 사이드바 '멀티 이미지' 클릭 시 파일 업로드 처리 및 콘텐츠 블록 추가
        function handleMultiImageUpload(event) {
            const files = event.target.files;
            if (files.length >= 2) {
                const imageUrls = [];
                let filesProcessed = 0;
                
                // 파일을 병렬로 처리하여 URL을 배열에 저장
                Array.from(files).forEach(file => {
                    const reader = new FileReader();
                    reader.onload = function(e) {
                        imageUrls.push(e.target.result);
                        filesProcessed++;
                        if (filesProcessed === files.length) {
                            addContentBlock('multi-image', imageUrls);
                        }
                    };
                    reader.readAsDataURL(file);
                });
            } else {
                alert('멀티 이미지는 2개 이상의 파일을 선택해야 합니다.');
            }
        }


        // 이미지 업로드 시 해당 영역을 이미지로 바꾸고 목업 AI 박스 업데이트
        function displayUploadedImage(url, targetElement, mockupTarget) {
            // 1. 해당 요소의 내용을 이미지로 대체 (메인 업로드 영역)
            targetElement.innerHTML = `
                <img src="${url}" alt="업로드된 작품" class="w-full h-full object-contain rounded-xl">
            `;
            targetElement.classList.remove('drag-area', 'border-dashed', 'border-gray-300', 'p-12', 'flex', 'flex-col', 'items-center', 'justify-center', 'text-center', 'cursor-pointer', 'hover:border-green-500', 'hover:bg-green-50');
            targetElement.style.minHeight = '400px';

            // 2. 목업 AI 박스 업데이트 (첫 번째 업로드된 이미지를 사용)
            mockupTarget.innerHTML = `
                <div class="w-full h-full bg-gray-300 rounded-lg overflow-hidden flex items-center justify-center relative">
                    <img src="${url}" alt="목업 미리보기" class="w-4/5 h-4/5 object-cover rounded-md shadow-lg transform scale-90" style="filter: brightness(0.9);">
                    <p class="absolute top-2 right-2 text-xs font-bold text-gray-700 bg-white bg-opacity-70 px-2 py-1 rounded">MOCKUP AI</p>
                </div>
            `;
        }

        // 콘텐츠 블록 추가 함수
        function addContentBlock(type, data = null) {
            let blockHTML = '';
            const newBlock = document.createElement('div');
            newBlock.className = 'content-block';

            if (type === 'text') {
                blockHTML = `
                    <textarea placeholder="텍스트를 입력하세요..." rows="5" 
                              class="w-full p-2 border-none rounded-lg focus:ring-green-100 focus:border-green-500 resize-none outline-none"></textarea>
                `;
            } else if (type === 'image' && data) {
                blockHTML = `<img src="${data}" alt="추가된 이미지" class="w-full object-contain rounded-lg max-h-96">`;
            } else if (type === 'multi-image' && Array.isArray(data)) {
                // 멀티 이미지는 양쪽으로 들어가도록 2개만 예시로 보여줌
                const images = data.slice(0, 2);
                blockHTML = `
                    <div class="flex space-x-4">
                        <img src="${images[0]}" alt="멀티 이미지 1" class="w-1/2 object-contain rounded-lg max-h-96">
                        <img src="${images[1] || images[0]}" alt="멀티 이미지 2" class="w-1/2 object-contain rounded-lg max-h-96">
                    </div>
                `;
            } else if (type === 'embed') {
                const embedUrl = document.getElementById('embed-input').value;
                if (embedUrl.trim() === '') {
                     blockHTML = `<div class="p-4 bg-yellow-100 text-yellow-800 rounded-lg">임베드 코드가 입력되지 않았습니다.</div>`;
                } else {
                    // 실제 임베드는 iframe 보안 문제로 간단한 텍스트로 대체
                    blockHTML = `
                        <div class="p-4 bg-gray-100 rounded-lg border-l-4 border-gray-400">
                            <p class="font-medium text-gray-700">임베드 콘텐츠 미리보기 (URL: ${embedUrl.substring(0, 50)}...)</p>
                            <p class="text-sm text-gray-500 mt-1">이 영역에 외부 미디어가 표시됩니다.</p>
                        </div>
                    `;
                }
                closeModal('embed');
            }

            if (blockHTML) {
                newBlock.innerHTML = blockHTML;
                contentContainer.appendChild(newBlock);
            }
        }


        // 팝업 열기/닫기 함수
        function openModal(modalId) {
            document.getElementById(`${modalId}-modal`).classList.remove('hidden');
        }

        function closeModal(modalId) {
            document.getElementById(`${modalId}-modal`).classList.add('hidden');
        }
        
        // 팝업 외부 클릭 시 닫기
        function closeModalOnOutsideClick(event, modalId) {
            const modal = document.getElementById(modalId);
            if (event.target === modal) {
                modal.classList.add('hidden');
            }
        }
    </script>
</body>
</html>
